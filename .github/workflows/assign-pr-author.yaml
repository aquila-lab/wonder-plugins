name: assign-pr-author

# Shim that delegates to the canonical reusable workflow in aquila-lab/.github.
# wonder-plugins is intentionally out of the sync bot's scope (registry
# `agents: []`), so — unlike the private consumers — this file is NOT fanned
# automatically. Mirror any change to the canonical shim
# (https://github.com/aquila-lab/.github/blob/master/.github/workflows/assign-pr-author.yaml)
# here by hand.
#
# Status check contract: produces context `assign-author / assign-author`,
# referenced in aquila-lab/.github/rulesets/{internal,public}-default.json.
# Do not rename the workflow `name:` or the calling job id without updating
# the rulesets in lock-step.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    uses: aquila-lab/.github/.github/workflows/assign-pr-author.yaml@master
