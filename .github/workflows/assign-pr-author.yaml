name: assign-pr-author

# Shim that delegates to the canonical reusable workflow in
# aquila-lab/.github. Do not edit this file directly — edit
# https://github.com/aquila-lab/.github/blob/master/.github/workflows/assign-pr-author.yml
# and the sync bot will open a PR here.
#
# Status check contract: produces context `assign-pr-author / assign-author`,
# referenced in aquila-lab/.github/rulesets/{internal,public}-default.json.
# Do not rename the workflow `name:` or the calling job id without updating
# the rulesets in lock-step.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    uses: aquila-lab/.github/.github/workflows/assign-pr-author.yml@master
