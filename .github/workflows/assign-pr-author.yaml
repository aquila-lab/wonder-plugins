name: assign-pr-author

# Posts the required `assign-author / assign-author` status check
# (aquila-lab/.github/rulesets/public-default.json) by delegating to a LOCAL
# reusable workflow, `assign-pr-author-impl.yaml`.
#
# Why a local copy instead of calling the canonical reusable in aquila-lab/.github:
# wonder-plugins is PUBLIC and the standards repo is PRIVATE, so a cross-repo
# `uses: aquila-lab/.github/.github/workflows/assign-pr-author.yaml@master`
# resolves to "workflow was not found" and the gate can never post (the prior
# failure mode here). wonder-plugins is also intentionally out of the sync bot's
# scope (registry `agents: []`), so this file is hand-maintained, not fanned.
#
# Status-check contract: the calling job id (`assign-author`) and the reusable's
# job id (`assign-author`) must stay in lock-step with the ruleset context.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    uses: ./.github/workflows/assign-pr-author-impl.yaml
    permissions:
      issues: write
      pull-requests: write
